name: Weekly Intelligence Report

on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch:

jobs:
  run-weekly-report:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore article history
        uses: actions/cache@v4
        with:
          path: .signalos_state
          key: signalos-seen-articles-${{ github.run_id }}
          restore-keys: |
            signalos-seen-articles-

      - name: Run weekly SignalOS report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.weekly_summary